[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  # Bundle TypeScript functions (and their shared src/lib imports) with esbuild.
  node_bundler = "esbuild"

# Canonical host: www → apex (requires both domains on the Netlify site).
[[redirects]]
  from = "https://www.gahitwen.com/*"
  to = "https://gahitwen.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.gahitwen.com/*"
  to = "https://gahitwen.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://gahitwen.com/*"
  to = "https://gahitwen.com/:splat"
  status = 301
  force = true

# Route /api/* to serverless functions. This MUST come before the SPA
# catch-all below, otherwise it would be swallowed by the index.html fallback.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — every other path serves the prerendered/app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
